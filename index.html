<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SHOT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00E5FF;
    --cyan-dim: rgba(0,229,255,0.15);
    --cyan-glow: rgba(0,229,255,0.4);
    --bg: #F5F5F0;
    --dark: #0D0D0D;
    --mid: #888;
    --surface: #EBEBЕ6;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--dark);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
  }
  .screen.active { display: flex; }

  /* ── SPLASH ── */
  #splash {
    background: var(--dark);
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* animated background lines */
  #splash::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 60px,
      rgba(0,229,255,0.04) 60px,
      rgba(0,229,255,0.04) 61px
    );
    animation: scanlines 8s linear infinite;
  }
  @keyframes scanlines { to { background-position: 0 61px; } }

  .splash-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .logo-shot {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(100px, 30vw, 160px);
    letter-spacing: -2px;
    color: white;
    line-height: 0.9;
    position: relative;
  }

  .logo-shot::after {
    content: 'SHOT';
    position: absolute;
    inset: 0;
    color: var(--cyan);
    clip-path: inset(0 0 85% 0);
    animation: glitch 4s infinite;
  }

  @keyframes glitch {
    0%, 90%, 100% { clip-path: inset(0 0 100% 0); transform: translate(0); }
    92% { clip-path: inset(0 0 70% 0); transform: translate(-3px, 0); }
    94% { clip-path: inset(20% 0 60% 0); transform: translate(3px, 0); }
    96% { clip-path: inset(40% 0 40% 0); transform: translate(-2px, 0); }
    98% { clip-path: inset(60% 0 20% 0); transform: translate(0); }
  }

  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan-glow);
    animation: dotPulse 2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.7; }
  }

  .logo-tag {
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-top: 8px;
    margin-bottom: 56px;
  }

  .start-btn {
    background: transparent;
    border: 1.5px solid var(--cyan);
    color: var(--cyan);
    padding: 16px 52px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.2s;
  }
  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s ease;
  }
  .start-btn:active::before { transform: scaleX(1); }
  .start-btn:active { color: var(--dark); }
  .start-btn span { position: relative; z-index: 1; }

  /* ── CAMERA ── */
  #camera { background: #000; position: relative; }

  #videoEl {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .flash {
    position: absolute; inset: 0;
    background: white; opacity: 0;
    pointer-events: none; z-index: 20;
    transition: opacity 0.03s;
  }
  .flash.show { opacity: 0.8; }

  .cam-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: space-between;
    z-index: 10;
  }

  .cam-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    padding-top: max(16px, env(safe-area-inset-top));
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
  }

  .cam-wordmark {
    font-family: 'Bebas Neue', cursive;
    font-size: 28px;
    letter-spacing: 4px;
    color: white;
  }
  .cam-wordmark .dot { color: var(--cyan); }

  .rec-pill {
    display: flex; align-items: center; gap: 7px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 6px 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .rec-pill.active { opacity: 1; }
  .rec-dot-small {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 6px var(--cyan);
    animation: blink 1.2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .rec-text {
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: white; font-weight: 500;
  }

  .cam-bottom {
    padding: 20px;
    padding-bottom: max(32px, env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* Buffer arc */
  .buffer-ring-wrap {
    position: relative;
    width: 150px; height: 150px;
  }

  .buffer-ring-wrap svg {
    position: absolute; inset: 0;
    transform: rotate(-90deg);
  }

  .ring-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 3; }
  .ring-fill {
    fill: none;
    stroke: var(--cyan);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 408; /* 2π × 65 */
    stroke-dashoffset: 408;
    transition: stroke-dashoffset 0.8s linear;
    filter: drop-shadow(0 0 6px var(--cyan));
  }

  /* THE SHOT BUTTON — inside the ring */
  .shot-btn {
    position: absolute; inset: 12px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border: 1.5px solid rgba(255,255,255,0.12);
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px;
    transition: transform 0.08s, background 0.1s;
    user-select: none;
    -webkit-touch-callout: none;
  }
  .shot-btn:active {
    transform: scale(0.92);
    background: rgba(0,229,255,0.15);
  }
  .shot-btn.disabled { opacity: 0.3; pointer-events: none; }

  .shot-btn-label {
    font-family: 'Bebas Neue', cursive;
    font-size: 32px;
    letter-spacing: 4px;
    color: white;
    line-height: 1;
  }
  .shot-btn-sub {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
  }

  .buffer-time-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    text-align: center;
  }
  .buffer-time-label strong { color: var(--cyan); font-weight: 400; }

  /* ── TRIM ── */
  #trim { background: var(--bg); }

  .trim-header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px;
    padding-top: max(16px, env(safe-area-inset-top));
    border-bottom: 1px solid rgba(0,0,0,0.08);
    flex-shrink: 0;
  }

  .back-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.07);
    border: none; cursor: pointer;
    font-size: 16px; color: var(--dark);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .back-btn:active { background: rgba(0,0,0,0.14); }

  .trim-wordmark {
    font-family: 'Bebas Neue', cursive;
    font-size: 22px; letter-spacing: 4px; color: var(--dark);
  }
  .trim-wordmark .dot { color: var(--cyan); }

  .video-preview {
    width: 100%; background: var(--dark);
    flex-shrink: 0; max-height: 40vh;
    object-fit: contain;
  }

  .trim-body {
    flex: 1; overflow-y: auto;
    padding: 20px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .section-label {
    font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--mid);
    margin-bottom: 12px;
  }

  .timeline {
    height: 40px; border-radius: 4px;
    background: rgba(0,0,0,0.06);
    position: relative; overflow: hidden;
    margin-bottom: 14px;
  }
  .timeline-fill {
    position: absolute; top: 0; bottom: 0;
    background: var(--cyan-dim);
    border-left: 2px solid var(--cyan);
    border-right: 2px solid var(--cyan);
  }

  .sliders { display: flex; gap: 16px; }
  .slider-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .slider-group label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--mid); }

  input[type=range] {
    width: 100%; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px;
    background: rgba(0,0,0,0.12); outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--dark);
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .time-readout {
    font-family: 'Bebas Neue', cursive;
    font-size: 36px; letter-spacing: 2px;
    color: var(--dark); text-align: center;
  }
  .time-readout em { color: var(--cyan); font-style: normal; font-size: 24px; }

  .dur-chip {
    text-align: center;
    font-size: 12px; color: var(--mid);
    background: rgba(0,0,0,0.05);
    border-radius: 20px; padding: 6px 16px;
  }
  .dur-chip strong { color: var(--dark); font-weight: 600; }

  .action-row {
    display: flex; gap: 10px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }

  .btn-ghost {
    flex: 1; background: transparent;
    border: 1.5px solid rgba(0,0,0,0.15);
    color: var(--mid); padding: 15px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: opacity 0.1s;
  }
  .btn-ghost:active { opacity: 0.6; }

  .btn-save {
    flex: 2;
    background: var(--dark); color: white;
    border: none; padding: 15px;
    border-radius: 4px;
    font-family: 'Bebas Neue', cursive;
    font-size: 16px; letter-spacing: 3px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: opacity 0.1s, transform 0.08s;
  }
  .btn-save:active { opacity: 0.85; transform: scale(0.98); }
  .btn-save:disabled { opacity: 0.3; pointer-events: none; }
  .btn-save .btn-dot { color: var(--cyan); }

  /* ── SAVED ── */
  #saved {
    background: var(--dark);
    align-items: center; justify-content: center;
    gap: 14px; padding: 40px 32px; text-align: center;
  }

  .saved-ring {
    width: 84px; height: 84px; border-radius: 50%;
    border: 2px solid var(--cyan);
    box-shadow: 0 0 30px var(--cyan-glow);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

  .saved-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 48px; letter-spacing: 6px; color: white;
  }
  .saved-dot { color: var(--cyan); }
  .saved-sub { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.7; max-width: 260px; }

  .saved-cta {
    margin-top: 12px;
    background: transparent;
    border: 1.5px solid var(--cyan);
    color: var(--cyan);
    padding: 15px 48px;
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 500;
    letter-spacing: 4px; text-transform: uppercase;
    cursor: pointer; width: 100%; max-width: 300px;
    transition: background 0.15s, color 0.15s;
  }
  .saved-cta:active { background: var(--cyan); color: var(--dark); }

  /* ── PROCESSING ── */
  .processing {
    position: fixed; inset: 0;
    background: rgba(13,13,13,0.92);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; z-index: 100;
  }
  .processing.show { display: flex; }
  .spinner {
    width: 44px; height: 44px;
    border: 2px solid rgba(0,229,255,0.15);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    box-shadow: 0 0 16px var(--cyan-glow);
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .proc-label {
    font-family: 'Bebas Neue', cursive;
    font-size: 14px; letter-spacing: 4px; color: rgba(255,255,255,0.4);
  }

  .toast {
    position: fixed; bottom: 28px;
    left: 50%; transform: translateX(-50%) translateY(70px);
    background: var(--dark);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px; padding: 11px 22px;
    font-size: 13px; color: rgba(255,255,255,0.8);
    z-index: 200; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <div class="splash-inner">
    <div class="logo-shot">SHOT</div>
    <div class="logo-dot"></div>
    <div class="logo-tag">Capture the moment</div>
    <button class="start-btn" onclick="startCamera()"><span>Start Recording</span></button>
  </div>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
  <video id="videoEl" autoplay playsinline muted></video>
  <div class="flash" id="flash"></div>
  <div class="cam-overlay">
    <div class="cam-top">
      <div class="cam-wordmark">SHOT<span class="dot">.</span></div>
      <div class="rec-pill" id="recPill">
        <div class="rec-dot-small"></div>
        <span class="rec-text" id="recLabel">Buffering</span>
      </div>
    </div>

    <div class="cam-bottom">
      <div class="buffer-ring-wrap">
        <svg viewBox="0 0 150 150" width="150" height="150">
          <circle class="ring-bg" cx="75" cy="75" r="65"/>
          <circle class="ring-fill" id="ringFill" cx="75" cy="75" r="65"/>
        </svg>
        <button class="shot-btn disabled" id="captureBtn" onclick="captureClip()">
          <div class="shot-btn-label">SHOT</div>
          <div class="shot-btn-sub">tap to capture</div>
        </button>
      </div>
      <div class="buffer-time-label" id="bufferLabel">Hold — buffering your game</div>
    </div>
  </div>
</div>

<!-- TRIM -->
<div id="trim" class="screen">
  <div class="trim-header">
    <button class="back-btn" onclick="backToCamera()">←</button>
    <div class="trim-wordmark">SHOT<span class="dot">.</span></div>
  </div>
  <video id="previewEl" class="video-preview" controls playsinline></video>
  <div class="trim-body">
    <div>
      <div class="section-label">Trim your clip</div>
      <div class="timeline"><div class="timeline-fill" id="timelineFill"></div></div>
      <div class="sliders">
        <div class="slider-group">
          <label>Start</label>
          <input type="range" id="startSlider" min="0" max="60" value="0" step="1" oninput="updateTrim()">
        </div>
        <div class="slider-group">
          <label>End</label>
          <input type="range" id="endSlider" min="0" max="60" value="60" step="1" oninput="updateTrim()">
        </div>
      </div>
    </div>
    <div class="time-readout" id="timeReadout">0s <em>→</em> 60s</div>
    <div class="dur-chip" id="durChip">Duration: <strong>60s</strong></div>
    <div class="action-row">
      <button class="btn-ghost" onclick="backToCamera()">Discard</button>
      <button class="btn-save" id="saveBtn" onclick="saveClip()">
        SAVE SHOT <span class="btn-dot">●</span>
      </button>
    </div>
  </div>
</div>

<!-- SAVED -->
<div id="saved" class="screen">
  <div class="saved-ring">🎯</div>
  <div class="saved-title">SHOT<span class="saved-dot">.</span></div>
  <div class="saved-sub">Clip saved to your device. Now share it.</div>
  <button class="saved-cta" onclick="backToCamera()">Record Another</button>
</div>

<div class="processing" id="processing">
  <div class="spinner"></div>
  <div class="proc-label">Clipping...</div>
</div>
<div class="toast" id="toast"></div>

<script>
  const BUFFER_SECS  = 60;
  const TIMESLICE_MS = 1000;
  const RING_CIRC    = 2 * Math.PI * 65; // ≈ 408.4

  let mediaStream    = null;
  let mediaRecorder  = null;
  let chunks         = [];
  let isBuffering    = false;
  let capturedBlob   = null;
  let capturedURL    = null;
  let videoDuration  = 0;
  let uiTimer        = null;

  // ── screens ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── camera ──
  async function startCamera() {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: true
      });
      document.getElementById('videoEl').srcObject = mediaStream;
      await document.getElementById('videoEl').play();
      showScreen('camera');
      startBuffering();
    } catch(err) {
      console.error(err);
      showToast('Camera access required — please allow and retry');
    }
  }

  // ── buffering ──
  function startBuffering() {
    chunks = [];
    isBuffering = true;
    document.getElementById('recPill').classList.add('active');
    document.getElementById('recLabel').textContent = 'Buffering';

    const mime = getBestMime();
    try { mediaRecorder = new MediaRecorder(mediaStream, mime ? { mimeType: mime } : {}); }
    catch(e) { mediaRecorder = new MediaRecorder(mediaStream); }

    mediaRecorder.ondataavailable = e => {
      if (e.data && e.data.size > 0) {
        chunks.push({ blob: e.data, ts: Date.now() });
        pruneBuffer();
      }
    };
    mediaRecorder.start(TIMESLICE_MS);
    uiTimer = setInterval(updateUI, 500);
  }

  function pruneBuffer() {
    const cutoff = Date.now() - BUFFER_SECS * 1000;
    while (chunks.length && chunks[0].ts < cutoff) chunks.shift();
  }

  function updateUI() {
    if (!isBuffering) return;
    const secs = chunks.length ? Math.min((Date.now() - chunks[0].ts) / 1000, BUFFER_SECS) : 0;
    const pct  = secs / BUFFER_SECS;

    // ring
    document.getElementById('ringFill').style.strokeDashoffset = RING_CIRC * (1 - pct);
    // label
    if (secs >= 3) {
      document.getElementById('captureBtn').classList.remove('disabled');
      document.getElementById('recLabel').textContent = 'REC';
      document.getElementById('bufferLabel').innerHTML =
        '<strong>' + Math.round(secs) + 's</strong> buffered — tap SHOT after your moment';
    } else {
      document.getElementById('bufferLabel').textContent = 'Hold — buffering your game';
    }
  }

  function getBestMime() {
    const t = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4',''];
    for (const m of t) if (!m || MediaRecorder.isTypeSupported(m)) return m;
    return '';
  }

  // ── capture ──
  async function captureClip() {
    if (!chunks.length) { showToast('Still buffering — wait a moment'); return; }

    const fl = document.getElementById('flash');
    fl.classList.add('show'); setTimeout(() => fl.classList.remove('show'), 100);

    isBuffering = false;
    clearInterval(uiTimer);

    if (mediaRecorder?.state === 'recording') {
      mediaRecorder.requestData();
      await delay(200);
      mediaRecorder.stop();
      await delay(300);
    }

    showProcessing(true);
    try {
      pruneBuffer();
      const mime = mediaRecorder?.mimeType || 'video/webm';
      capturedBlob = new Blob(chunks.map(c => c.blob), { type: mime });
      if (capturedURL) URL.revokeObjectURL(capturedURL);
      capturedURL = URL.createObjectURL(capturedBlob);

      const prev = document.getElementById('previewEl');
      prev.src = capturedURL;

      prev.onloadedmetadata = () => {
        videoDuration = Math.ceil(prev.duration) || chunks.length;
        setupSliders(videoDuration);
        showProcessing(false);
        showScreen('trim');
      };

      setTimeout(() => {
        if (document.getElementById('processing').classList.contains('show')) {
          videoDuration = chunks.length;
          setupSliders(videoDuration);
          showProcessing(false);
          showScreen('trim');
        }
      }, 3500);

    } catch(err) {
      console.error(err);
      showProcessing(false);
      showToast('Something went wrong — try again');
      backToCamera();
    }
  }

  // ── trim ──
  function setupSliders(dur) {
    ['startSlider','endSlider'].forEach((id, i) => {
      const el = document.getElementById(id);
      el.max = dur; el.value = i === 0 ? 0 : dur;
    });
    updateTrim();
  }

  function updateTrim() {
    let sv = +document.getElementById('startSlider').value;
    let ev = +document.getElementById('endSlider').value;
    if (sv >= ev) { sv = Math.max(0, ev-1); document.getElementById('startSlider').value = sv; }
    const dur = videoDuration || 60;
    document.getElementById('timelineFill').style.left  = (sv/dur*100)+'%';
    document.getElementById('timelineFill').style.width = ((ev-sv)/dur*100)+'%';
    document.getElementById('timeReadout').innerHTML = sv+'s <em>→</em> '+ev+'s';
    document.getElementById('durChip').innerHTML = 'Duration: <strong>'+(ev-sv)+'s</strong>';
    const prev = document.getElementById('previewEl');
    if (prev.readyState >= 1) prev.currentTime = sv;
  }

  // ── save ──
  async function saveClip() {
    showProcessing(true);
    document.getElementById('saveBtn').disabled = true;
    try {
      const url = URL.createObjectURL(capturedBlob);
      const a   = document.createElement('a');
      a.href     = url;
      a.download = 'shot-' + Date.now() + (capturedBlob.type.includes('mp4') ? '.mp4' : '.webm');
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
      showProcessing(false);
      showScreen('saved');
    } catch(e) {
      showProcessing(false);
      document.getElementById('saveBtn').disabled = false;
      showToast('Save failed — try again');
    }
  }

  // ── back ──
  function backToCamera() {
    showScreen('camera');
    if (mediaStream) startBuffering();
  }

  // ── utils ──
  function showProcessing(v) { document.getElementById('processing').classList.toggle('show', v); }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - (document.lastTouch||0) < 300) e.preventDefault();
    document.lastTouch = now;
  }, { passive: false });
</script>
</body>
</html>
