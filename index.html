<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SCOWT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --red: #FF1F1F;
    --dark: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --text: #ffffff;
    --muted: #666;
    --green: #00FF87;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* SCREENS */
  .screen { 
    display: none; 
    flex-direction: column; 
    height: 100vh; 
    height: 100dvh;
  }
  .screen.active { display: flex; }

  /* ── SPLASH ── */
  #splash {
    align-items: center;
    justify-content: center;
    background: var(--dark);
    gap: 8px;
  }

  .logo {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(56px, 18vw, 96px);
    letter-spacing: 8px;
    color: var(--text);
    position: relative;
  }
  .logo span { color: var(--red); }

  .tagline {
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 48px;
  }

  .btn-primary {
    background: var(--red);
    color: white;
    border: none;
    padding: 18px 48px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
  }
  .btn-primary:active { transform: scale(0.96); opacity: 0.9; }

  /* ── CAMERA ── */
  #camera {
    position: relative;
    background: #000;
  }

  #videoEl {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .cam-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 0;
    z-index: 10;
  }

  /* Top bar */
  .cam-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    padding-top: max(16px, env(safe-area-inset-top));
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  }

  .cam-logo {
    font-family: 'Black Ops One', cursive;
    font-size: 22px;
    letter-spacing: 4px;
    color: white;
  }
  .cam-logo span { color: var(--red); }

  .rec-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: white;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .rec-indicator.active { opacity: 1; }
  .rec-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .buffer-bar-wrap {
    padding: 0 20px 8px;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.5));
  }
  .buffer-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .buffer-bar {
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .buffer-fill {
    height: 100%;
    background: var(--red);
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s linear;
  }

  /* Bottom controls */
  .cam-bottom {
    padding: 24px 20px;
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .clip-hint {
    font-size: 12px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    text-align: center;
  }

  /* THE BIG RED BUTTON */
  .big-red-btn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #FF4444, #CC0000);
    border: 4px solid rgba(255,255,255,0.15);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    box-shadow: 
      0 0 0 8px rgba(255,31,31,0.15),
      0 0 40px rgba(255,31,31,0.4),
      0 8px 32px rgba(0,0,0,0.6),
      inset 0 -4px 8px rgba(0,0,0,0.3);
    transition: transform 0.1s, box-shadow 0.1s;
    -webkit-touch-callout: none;
    user-select: none;
  }
  .big-red-btn:active {
    transform: scale(0.93);
    box-shadow:
      0 0 0 8px rgba(255,31,31,0.1),
      0 0 20px rgba(255,31,31,0.3),
      0 4px 16px rgba(0,0,0,0.6),
      inset 0 2px 8px rgba(0,0,0,0.4);
  }
  .big-red-btn.disabled {
    opacity: 0.4;
    pointer-events: none;
  }

  .btn-icon { font-size: 28px; }
  .btn-label {
    font-family: 'Black Ops One', cursive;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.9);
  }

  /* Flash overlay */
  .flash {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.05s;
  }
  .flash.show { opacity: 0.6; }

  /* ── TRIM ── */
  #trim {
    background: var(--dark);
    flex-direction: column;
  }

  .trim-header {
    padding: 20px;
    padding-top: max(20px, env(safe-area-inset-top));
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid #1e1e1e;
  }

  .back-btn {
    background: var(--surface2);
    border: none;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .trim-title {
    font-family: 'Black Ops One', cursive;
    font-size: 20px;
    letter-spacing: 3px;
  }
  .trim-title span { color: var(--red); }

  .video-preview {
    width: 100%;
    background: #000;
    flex-shrink: 0;
    max-height: 45vh;
    object-fit: contain;
  }

  .trim-controls {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .trim-section-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .range-container {
    position: relative;
    padding: 0 4px;
  }

  .timeline {
    height: 48px;
    background: var(--surface2);
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .timeline-fill {
    position: absolute;
    top: 0;
    bottom: 0;
    background: rgba(255,31,31,0.25);
    border-left: 3px solid var(--red);
    border-right: 3px solid var(--red);
  }

  .timeline-marks {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    padding: 0 4px 4px;
    gap: 0;
  }

  .range-inputs {
    display: flex;
    gap: 16px;
  }

  .range-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .range-group label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .range-group input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--surface2);
    outline: none;
  }
  .range-group input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--red);
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(255,31,31,0.5);
  }

  .time-display {
    font-family: 'Black Ops One', cursive;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--text);
    text-align: center;
  }
  .time-display span { color: var(--red); font-size: 20px; }

  .duration-chip {
    background: var(--surface2);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 1px;
  }
  .duration-chip strong { color: var(--green); }

  .action-row {
    display: flex;
    gap: 12px;
    padding-bottom: max(24px, env(safe-area-inset-bottom));
  }

  .btn-secondary {
    flex: 1;
    background: var(--surface2);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.1s;
  }
  .btn-secondary:active { opacity: 0.7; }

  .btn-save {
    flex: 2;
    background: var(--red);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 4px;
    font-family: 'Black Ops One', cursive;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity 0.1s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-save:active { opacity: 0.9; transform: scale(0.98); }
  .btn-save:disabled { opacity: 0.5; pointer-events: none; }

  /* ── SAVED ── */
  #saved {
    align-items: center;
    justify-content: center;
    background: var(--dark);
    gap: 16px;
    padding: 40px 32px;
    text-align: center;
  }

  .saved-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(0,255,135,0.1);
    border: 2px solid var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .saved-title {
    font-family: 'Black Ops One', cursive;
    font-size: 32px;
    letter-spacing: 4px;
  }

  .saved-sub {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 280px;
  }

  .saved-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 320px;
    margin-top: 8px;
  }

  /* Processing overlay */
  .processing {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 100;
  }
  .processing.show { display: flex; }
  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .processing-text {
    font-family: 'Black Ops One', cursive;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--muted);
  }

  /* Notification toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid #333;
    border-radius: 24px;
    padding: 12px 24px;
    font-size: 13px;
    color: white;
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <div class="logo">SC<span>O</span>WT</div>
  <div class="tagline">Your game. Discovered.</div>
  <button class="btn-primary" onclick="startCamera()">START RECORDING</button>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
  <video id="videoEl" autoplay playsinline muted></video>
  <div class="flash" id="flash"></div>
  
  <div class="cam-overlay">
    <div class="cam-top">
      <div class="cam-logo">SC<span>O</span>WT</div>
      <div class="rec-indicator" id="recIndicator">
        <div class="rec-dot"></div>
        <span>BUFFERING</span>
      </div>
    </div>

    <div>
      <div class="buffer-bar-wrap">
        <div class="buffer-label">
          <span>BUFFER</span>
          <span id="bufferTime">0s / 60s</span>
        </div>
        <div class="buffer-bar">
          <div class="buffer-fill" id="bufferFill"></div>
        </div>
      </div>

      <div class="cam-bottom">
        <div class="clip-hint">Press after a great moment to capture the last 60 seconds</div>
        <button class="big-red-btn disabled" id="captureBtn" onclick="captureClip()">
          <div class="btn-icon">⏺</div>
          <div class="btn-label">SCOWT IT</div>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- TRIM -->
<div id="trim" class="screen">
  <div class="trim-header">
    <button class="back-btn" onclick="backToCamera()">←</button>
    <div class="trim-title">SC<span>O</span>WT IT</div>
  </div>

  <video id="previewEl" class="video-preview" controls playsinline></video>

  <div class="trim-controls">
    <div>
      <div class="trim-section-label">Trim your clip</div>
      
      <div class="timeline">
        <div class="timeline-fill" id="timelineFill"></div>
      </div>

      <div class="range-inputs">
        <div class="range-group">
          <label>Start</label>
          <input type="range" id="startSlider" min="0" max="60" value="0" step="1" oninput="updateTrim()">
        </div>
        <div class="range-group">
          <label>End</label>
          <input type="range" id="endSlider" min="0" max="60" value="60" step="1" oninput="updateTrim()">
        </div>
      </div>
    </div>

    <div class="time-display" id="timeDisplay">
      0s <span>→</span> 60s
    </div>

    <div class="duration-chip" id="durationChip">
      Clip duration: <strong>60s</strong>
    </div>

    <div class="action-rows">
      <div class="action-row">
        <button class="btn-secondary" onclick="backToCamera()">Discard</button>
        <button class="btn-save" id="saveBtn" onclick="saveClip()">
          💾 SAVE CLIP
        </button>
      </div>
    </div>
  </div>
</div>

<!-- SAVED -->
<div id="saved" class="screen">
  <div class="saved-icon">✓</div>
  <div class="saved-title">SCOWTED!</div>
  <div class="saved-sub">Your clip has been saved to your camera roll. Go show everyone.</div>
  <div class="saved-actions">
    <button class="btn-primary" onclick="backToCamera()" style="width:100%">RECORD ANOTHER</button>
  </div>
</div>

<!-- Processing overlay -->
<div class="processing" id="processing">
  <div class="spinner"></div>
  <div class="processing-text">CLIPPING...</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── STATE ──
  const BUFFER_DURATION = 60; // seconds
  let mediaStream = null;
  let mediaRecorder = null;
  let chunks = [];
  let bufferInterval = null;
  let bufferStartTime = null;
  let capturedBlob = null;
  let capturedVideoURL = null;
  let videoDuration = 0;

  // ── NAVIGATION ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── CAMERA START ──
  async function startCamera() {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        video: { 
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });

      const videoEl = document.getElementById('videoEl');
      videoEl.srcObject = mediaStream;
      await videoEl.play();

      showScreen('camera');
      startBuffering();

    } catch (err) {
      showToast('Camera access needed to use Scowt');
      console.error(err);
    }
  }

  // ── CIRCULAR BUFFER ──
  // We use a rolling MediaRecorder approach:
  // Record in 5-second chunks, keep only last BUFFER_DURATION seconds worth
  
  let recordedChunks = [];
  let chunkTimestamps = [];
  let isBuffering = false;

  function startBuffering() {
    if (!mediaStream) return;
    isBuffering = true;
    bufferStartTime = Date.now();
    
    document.getElementById('recIndicator').classList.add('active');
    
    startChunkRecording();
    updateBufferUI();
  }

  function startChunkRecording() {
    if (!isBuffering) return;

    // Determine best mime type
    const mimeType = getSupportedMimeType();
    
    try {
      mediaRecorder = new MediaRecorder(mediaStream, mimeType ? { mimeType } : {});
    } catch(e) {
      mediaRecorder = new MediaRecorder(mediaStream);
    }

    mediaRecorder.ondataavailable = (e) => {
      if (e.data && e.data.size > 0) {
        recordedChunks.push(e.data);
        chunkTimestamps.push(Date.now());
        pruneOldChunks();
      }
    };

    mediaRecorder.onstop = () => {
      if (isBuffering) {
        // restart immediately for continuous buffering
        setTimeout(startChunkRecording, 50);
      }
    };

    mediaRecorder.start();
    // collect data every second for fine-grained control
    setTimeout(() => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
    }, 2000);
  }

  function getSupportedMimeType() {
    const types = [
      'video/webm;codecs=vp9',
      'video/webm;codecs=vp8', 
      'video/webm',
      'video/mp4',
      ''
    ];
    for (const type of types) {
      if (!type || MediaRecorder.isTypeSupported(type)) return type;
    }
    return '';
  }

  function pruneOldChunks() {
    const cutoff = Date.now() - (BUFFER_DURATION * 1000);
    while (chunkTimestamps.length > 0 && chunkTimestamps[0] < cutoff) {
      recordedChunks.shift();
      chunkTimestamps.shift();
    }
  }

  function updateBufferUI() {
    if (!isBuffering) return;
    
    const elapsed = Math.min((Date.now() - bufferStartTime) / 1000, BUFFER_DURATION);
    const pct = (elapsed / BUFFER_DURATION) * 100;
    
    document.getElementById('bufferFill').style.width = pct + '%';
    document.getElementById('bufferTime').textContent = 
      Math.round(elapsed) + 's / ' + BUFFER_DURATION + 's';

    // Enable button once we have some footage
    const btn = document.getElementById('captureBtn');
    if (elapsed >= 3) {
      btn.classList.remove('disabled');
    }

    setTimeout(updateBufferUI, 500);
  }

  // ── CAPTURE ──
  async function captureClip() {
    if (recordedChunks.length === 0) {
      showToast('Keep recording — building buffer...');
      return;
    }

    // Flash effect
    const flash = document.getElementById('flash');
    flash.classList.add('show');
    setTimeout(() => flash.classList.remove('show'), 150);

    // Stop current recording to get final chunk
    isBuffering = false;
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }

    showProcessing(true);

    // Small delay to let last chunk finalize
    await delay(400);

    try {
      // Determine mime type from recorder or default
      const mimeType = mediaRecorder?.mimeType || 'video/webm';
      capturedBlob = new Blob(recordedChunks, { type: mimeType });
      
      if (capturedVideoURL) URL.revokeObjectURL(capturedVideoURL);
      capturedVideoURL = URL.createObjectURL(capturedBlob);

      const previewEl = document.getElementById('previewEl');
      previewEl.src = capturedVideoURL;
      
      previewEl.onloadedmetadata = () => {
        videoDuration = Math.round(previewEl.duration) || BUFFER_DURATION;
        setupTrimSliders(videoDuration);
        showProcessing(false);
        showScreen('trim');
      };

      previewEl.onerror = () => {
        showProcessing(false);
        showToast('Could not preview — saving anyway');
        setupTrimSliders(BUFFER_DURATION);
        showScreen('trim');
      };

    } catch (err) {
      showProcessing(false);
      showToast('Something went wrong. Try again.');
      restartBuffering();
    }
  }

  function setupTrimSliders(duration) {
    const start = document.getElementById('startSlider');
    const end = document.getElementById('endSlider');
    start.max = duration;
    end.max = duration;
    start.value = 0;
    end.value = duration;
    updateTrim();
  }

  function updateTrim() {
    const startVal = parseInt(document.getElementById('startSlider').value);
    const endVal = parseInt(document.getElementById('endSlider').value);
    
    // Ensure start < end
    if (startVal >= endVal) {
      document.getElementById('startSlider').value = endVal - 1;
      return;
    }

    const duration = videoDuration || BUFFER_DURATION;
    const startPct = (startVal / duration) * 100;
    const endPct = (endVal / duration) * 100;

    document.getElementById('timelineFill').style.left = startPct + '%';
    document.getElementById('timelineFill').style.width = (endPct - startPct) + '%';

    document.getElementById('timeDisplay').innerHTML = 
      startVal + 's <span>→</span> ' + endVal + 's';
    
    const clipLen = endVal - startVal;
    document.getElementById('durationChip').innerHTML = 
      'Clip duration: <strong>' + clipLen + 's</strong>';

    // Seek video preview to start point
    const previewEl = document.getElementById('previewEl');
    if (previewEl.readyState >= 1) {
      previewEl.currentTime = startVal;
    }
  }

  // ── SAVE ──
  async function saveClip() {
    const startVal = parseInt(document.getElementById('startSlider').value);
    const endVal = parseInt(document.getElementById('endSlider').value);

    showProcessing(true);
    document.getElementById('saveBtn').disabled = true;

    try {
      let blobToSave = capturedBlob;

      // For now, save the full blob (trimming requires FFmpeg/WebAssembly which is heavy)
      // The trim points are shown to user — future version will do server-side trim
      // For MVP: save full clip, user can trim in Photos app
      
      const url = URL.createObjectURL(blobToSave);
      const a = document.createElement('a');
      a.href = url;
      
      // Determine file extension
      const ext = blobToSave.type.includes('mp4') ? 'mp4' : 'webm';
      a.download = 'scowt-' + new Date().toISOString().slice(0,19).replace(/[:-]/g,'') + '.' + ext;
      
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      
      setTimeout(() => URL.revokeObjectURL(url), 5000);

      showProcessing(false);
      showScreen('saved');

    } catch (err) {
      showProcessing(false);
      document.getElementById('saveBtn').disabled = false;
      showToast('Save failed — try again');
    }
  }

  // ── BACK / RESTART ──
  function backToCamera() {
    showScreen('camera');
    restartBuffering();
  }

  function restartBuffering() {
    recordedChunks = [];
    chunkTimestamps = [];
    bufferStartTime = Date.now();
    isBuffering = true;
    
    document.getElementById('bufferFill').style.width = '0%';
    document.getElementById('bufferTime').textContent = '0s / 60s';
    document.getElementById('captureBtn').classList.add('disabled');
    
    startChunkRecording();
    updateBufferUI();
  }

  // ── UTILS ──
  function showProcessing(show) {
    document.getElementById('processing').classList.toggle('show', show);
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // Prevent accidental zooming on button double-tap
  document.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - (document.lastTouchEnd || 0) < 300) e.preventDefault();
    document.lastTouchEnd = now;
  }, { passive: false });
</script>
</body>
</html>
