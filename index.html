<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SHOT.</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<style>
  :root {
    --cyan: #00E5FF;
    --cyan-dim: rgba(0,229,255,0.12);
    --cyan-glow: rgba(0,229,255,0.35);
    --bg: #F5F5F0;
    --dark: #0D0D0D;
    --dark2: #1A1A1A;
    --mid: #888;
    --green: #00FF87;
    --red: #FF3B3B;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--dark);
    color: white;
    font-family: 'Inter', sans-serif;
    height: 100vh; height: 100dvh;
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  .screen {
    display: none; flex-direction: column;
    height: 100vh; height: 100dvh;
    overflow: hidden;
  }
  .screen.active { display: flex; }

  /* ── SPLASH / LOBBY ── */
  #lobby {
    background: var(--dark);
    align-items: center; justify-content: center;
    gap: 0; position: relative; overflow: hidden;
    padding: 32px 28px;
    padding-top: max(32px, env(safe-area-inset-top));
  }
  #lobby::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 60px,
      rgba(0,229,255,0.03) 60px, rgba(0,229,255,0.03) 61px
    );
  }

  .lobby-inner {
    position: relative; z-index: 1;
    width: 100%; max-width: 360px;
    display: flex; flex-direction: column; align-items: center; gap: 0;
  }

  .logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 80px; letter-spacing: -2px;
    color: white; line-height: 1;
  }
  .logo-dot { color: var(--cyan); }

  .logo-tag {
    font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
    color: rgba(255,255,255,0.3); margin-bottom: 40px; margin-top: 4px;
  }

  .lobby-card {
    width: 100%; background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
    margin-bottom: 16px;
  }

  .lobby-card-title {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.3); margin-bottom: 4px;
  }

  .name-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 14px 16px;
    color: white; font-family: 'Inter', sans-serif;
    font-size: 16px; outline: none;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--cyan); }
  .name-input::placeholder { color: rgba(255,255,255,0.25); }

  .btn-create {
    width: 100%; background: var(--cyan); color: var(--dark);
    border: none; padding: 16px;
    font-family: 'Bebas Neue', cursive;
    font-size: 18px; letter-spacing: 3px;
    cursor: pointer; border-radius: 8px;
    transition: opacity 0.1s, transform 0.08s;
  }
  .btn-create:active { opacity: 0.85; transform: scale(0.98); }

  .divider {
    display: flex; align-items: center; gap: 12px;
    color: rgba(255,255,255,0.2); font-size: 11px; letter-spacing: 2px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(255,255,255,0.08);
  }

  .code-input-wrap { display: flex; gap: 10px; }
  .code-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 14px 16px;
    color: white; font-family: 'Bebas Neue', cursive;
    font-size: 28px; letter-spacing: 8px; outline: none;
    text-align: center; text-transform: uppercase;
    transition: border-color 0.2s;
  }
  .code-input:focus { border-color: var(--cyan); }
  .code-input::placeholder { color: rgba(255,255,255,0.15); font-size: 20px; letter-spacing: 4px; }

  .btn-join {
    background: transparent; color: var(--cyan);
    border: 1.5px solid var(--cyan);
    padding: 14px 20px; border-radius: 8px;
    font-family: 'Bebas Neue', cursive;
    font-size: 18px; letter-spacing: 2px;
    cursor: pointer; white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .btn-join:active { background: var(--cyan); color: var(--dark); }

  /* ── WAITING ROOM ── */
  #waiting {
    background: var(--dark);
    align-items: center; justify-content: center;
    padding: 28px;
    padding-top: max(28px, env(safe-area-inset-top));
    gap: 24px;
  }

  .session-code-display {
    text-align: center;
  }
  .session-code-label {
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(255,255,255,0.3); margin-bottom: 8px;
  }
  .session-code-number {
    font-family: 'Bebas Neue', cursive;
    font-size: 72px; letter-spacing: 12px; color: var(--cyan);
    text-shadow: 0 0 30px var(--cyan-glow);
    line-height: 1;
  }
  .session-code-hint {
    font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 8px;
  }

  .members-list {
    width: 100%; max-width: 340px;
    background: var(--dark2); border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.07);
    overflow: hidden;
  }
  .members-header {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }
  .member-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .member-item:last-child { border-bottom: none; }
  .member-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--cyan-dim); border: 1px solid var(--cyan);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: var(--cyan);
    flex-shrink: 0;
  }
  .member-name { font-size: 14px; font-weight: 500; color: white; }
  .member-you {
    font-size: 10px; letter-spacing: 1px; color: rgba(255,255,255,0.3);
    margin-left: auto;
  }
  .member-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); margin-left: auto;
    box-shadow: 0 0 6px var(--green);
  }

  .btn-start-session {
    width: 100%; max-width: 340px;
    background: var(--cyan); color: var(--dark);
    border: none; padding: 18px;
    font-family: 'Bebas Neue', cursive;
    font-size: 20px; letter-spacing: 4px;
    cursor: pointer; border-radius: 8px;
    transition: opacity 0.1s;
  }
  .btn-start-session:active { opacity: 0.85; }

  /* ── CAMERA ── */
  #camera { background: #000; position: relative; }

  #videoEl {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .flash {
    position: absolute; inset: 0; background: white;
    opacity: 0; pointer-events: none; z-index: 20;
    transition: opacity 0.03s;
  }
  .flash.show { opacity: 0.8; }

  .cam-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: space-between; z-index: 10;
  }

  .cam-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    padding-top: max(16px, env(safe-area-inset-top));
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    gap: 8px;
  }

  .cam-wordmark {
    font-family: 'Bebas Neue', cursive;
    font-size: 24px; letter-spacing: 3px; color: white;
    flex-shrink: 0;
  }
  .cam-wordmark .dot { color: var(--cyan); }

  /* Session members strip */
  .session-strip {
    flex: 1; display: flex; align-items: center;
    gap: 6px; overflow: hidden; padding: 0 4px;
  }
  .strip-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(0,229,255,0.2);
    border: 1.5px solid var(--cyan);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--cyan);
    flex-shrink: 0; position: relative;
  }
  .strip-avatar.recording::after {
    content: ''; position: absolute;
    inset: -3px; border-radius: 50%;
    border: 2px solid var(--red);
    animation: recordPulse 1s infinite;
  }
  @keyframes recordPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.1)} }

  .rec-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 5px 10px;
    flex-shrink: 0;
  }
  .rec-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .rec-text { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: white; }

  .cam-top-btns { display: flex; gap: 8px; flex-shrink: 0; }
  .cam-icon-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    color: white; font-size: 15px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s;
  }
  .cam-icon-btn:active { border-color: var(--cyan); }

  /* Zoom slider */
  .zoom-wrap {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    z-index: 15; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .zoom-wrap.visible { opacity: 1; pointer-events: all; }
  .zoom-val {
    font-family: 'Bebas Neue', cursive;
    font-size: 13px; color: var(--cyan); letter-spacing: 1px;
  }
  .zoom-slider {
    -webkit-appearance: none; appearance: none;
    writing-mode: vertical-lr; direction: rtl;
    width: 4px; height: 130px;
    background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
  }
  .zoom-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    border-radius: 50%; background: white;
    box-shadow: 0 0 6px var(--cyan-glow);
  }
  .zoom-label-v { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); }

  /* Focus ring */
  .focus-ring {
    position: absolute; width: 60px; height: 60px;
    border: 2px solid var(--cyan); border-radius: 50%;
    pointer-events: none; z-index: 15;
    transform: translate(-50%,-50%) scale(1.4); opacity: 0;
    transition: transform 0.2s, opacity 0.2s;
    box-shadow: 0 0 10px var(--cyan-glow);
  }
  .focus-ring.focusing { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  .focus-ring.focused { border-color: gold; box-shadow: 0 0 10px rgba(255,215,0,0.4); opacity: 0.6; }

  .cam-bottom {
    padding: 16px;
    padding-bottom: max(28px, env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }

  .buffer-ring-wrap { position: relative; width: 140px; height: 140px; }
  .buffer-ring-wrap svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 3; }
  .ring-fill {
    fill: none; stroke: var(--cyan); stroke-width: 3; stroke-linecap: round;
    stroke-dasharray: 376; stroke-dashoffset: 376;
    filter: drop-shadow(0 0 5px var(--cyan));
    transition: stroke-dashoffset 0.8s linear;
  }
  .shot-btn {
    position: absolute; inset: 10px; border-radius: 50%;
    background: rgba(0,0,0,0.65); backdrop-filter: blur(10px);
    border: 1.5px solid rgba(255,255,255,0.12);
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
    transition: transform 0.08s, background 0.1s;
    user-select: none; -webkit-touch-callout: none;
  }
  .shot-btn:active { transform: scale(0.91); background: rgba(0,229,255,0.15); }
  .shot-btn.disabled { opacity: 0.3; pointer-events: none; }
  .shot-btn-label { font-family: 'Bebas Neue', cursive; font-size: 30px; letter-spacing: 4px; color: white; line-height: 1; }
  .shot-btn-sub { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); }

  .buffer-hint {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,0.4); text-align: center;
  }
  .buffer-hint strong { color: var(--cyan); font-weight: 400; }

  /* ── REVIEW ── */
  #review { background: var(--dark); }

  .review-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    padding-top: max(14px, env(safe-area-inset-top));
    border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;
  }
  .review-title { font-family: 'Bebas Neue', cursive; font-size: 22px; letter-spacing: 3px; }
  .review-title .dot { color: var(--cyan); }
  .review-session-badge {
    background: var(--cyan-dim); border: 1px solid var(--cyan);
    border-radius: 20px; padding: 4px 12px;
    font-size: 11px; letter-spacing: 2px; color: var(--cyan);
  }

  .review-body { flex: 1; overflow-y: auto; padding: 16px; }

  .review-section-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.3); margin-bottom: 12px;
  }

  .clips-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 20px;
  }

  .clip-card {
    background: var(--dark2); border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.07);
    overflow: hidden; cursor: pointer;
    transition: border-color 0.2s, transform 0.1s;
    position: relative;
  }
  .clip-card:active { transform: scale(0.97); }
  .clip-card.selected { border-color: var(--cyan); }
  .clip-card.uploading { opacity: 0.6; }

  .clip-thumb {
    width: 100%; aspect-ratio: 16/9; background: #111;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; position: relative; overflow: hidden;
  }
  .clip-thumb video { width: 100%; height: 100%; object-fit: cover; }
  .clip-play-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.3);
  }
  .clip-play-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,229,255,0.9);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--dark);
  }
  .clip-uploading-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
  }
  .clip-upload-spinner {
    width: 24px; height: 24px;
    border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--cyan);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .clip-upload-pct { font-size: 11px; color: white; }

  .clip-info { padding: 8px 10px; }
  .clip-owner { font-size: 12px; font-weight: 600; color: white; }
  .clip-duration { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .clip-mine-badge {
    position: absolute; top: 6px; right: 6px;
    background: var(--cyan); color: var(--dark);
    border-radius: 4px; padding: 2px 6px;
    font-size: 8px; font-weight: 700; letter-spacing: 1px;
  }

  .review-actions {
    display: flex; flex-direction: column; gap: 10px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
  }

  .btn-save-my {
    width: 100%; background: var(--cyan); color: var(--dark);
    border: none; padding: 16px;
    font-family: 'Bebas Neue', cursive; font-size: 18px; letter-spacing: 3px;
    cursor: pointer; border-radius: 8px;
    transition: opacity 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-save-my:active { opacity: 0.85; }
  .btn-save-my:disabled { opacity: 0.4; pointer-events: none; }

  .btn-record-again {
    width: 100%; background: transparent;
    border: 1.5px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.6); padding: 14px;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; border-radius: 8px;
    transition: border-color 0.2s;
  }
  .btn-record-again:active { border-color: var(--cyan); color: var(--cyan); }

  /* Clip viewer modal */
  .clip-viewer {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95);
    z-index: 50; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    padding: 20px;
  }
  .clip-viewer.show { display: flex; }
  .clip-viewer video { width: 100%; max-height: 70vh; border-radius: 8px; }
  .clip-viewer-close {
    position: absolute; top: max(20px, env(safe-area-inset-top)); right: 20px;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: none; color: white;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .clip-viewer-owner {
    font-family: 'Bebas Neue', cursive; font-size: 18px; letter-spacing: 3px;
    color: var(--cyan); margin-top: 16px;
  }
  .clip-viewer-btns { display: flex; gap: 10px; margin-top: 16px; width: 100%; }
  .btn-viewer-save {
    flex: 1; background: var(--cyan); color: var(--dark);
    border: none; padding: 14px;
    font-family: 'Bebas Neue', cursive; font-size: 16px; letter-spacing: 2px;
    cursor: pointer; border-radius: 8px;
  }
  .btn-viewer-save:active { opacity: 0.85; }

  /* ── PROCESSING ── */
  .processing {
    position: fixed; inset: 0; background: rgba(13,13,13,0.93);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; z-index: 100;
  }
  .processing.show { display: flex; }
  .proc-spinner {
    width: 44px; height: 44px;
    border: 2px solid rgba(0,229,255,0.15); border-top-color: var(--cyan);
    border-radius: 50%; animation: spin 0.75s linear infinite;
    box-shadow: 0 0 14px var(--cyan-glow);
  }
  .proc-label { font-family: 'Bebas Neue', cursive; font-size: 13px; letter-spacing: 4px; color: rgba(255,255,255,0.4); }

  .toast {
    position: fixed; bottom: 28px;
    left: 50%; transform: translateX(-50%) translateY(70px);
    background: var(--dark2); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px; padding: 11px 22px;
    font-size: 13px; color: rgba(255,255,255,0.85);
    z-index: 200; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap; max-width: 90vw; text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby" class="screen active">
  <div class="lobby-inner">
    <div class="logo">SHOT<span class="logo-dot">.</span></div>
    <div class="logo-tag">Capture the moment</div>

    <div class="lobby-card">
      <div class="lobby-card-title">Your name</div>
      <input class="name-input" id="nameInput" placeholder="Enter your name" maxlength="20" autocomplete="off">
      <button class="btn-create" onclick="createSession()">CREATE SESSION</button>
    </div>

    <div style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px;">
      <div class="divider">OR JOIN</div>
      <div class="code-input-wrap">
        <input class="code-input" id="codeInput" placeholder="CODE" maxlength="4"
          inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'')">
        <button class="btn-join" onclick="joinSession()">JOIN</button>
      </div>
    </div>
  </div>
</div>

<!-- WAITING ROOM -->
<div id="waiting" class="screen">
  <div class="session-code-display">
    <div class="session-code-label">Session Code</div>
    <div class="session-code-number" id="displayCode">----</div>
    <div class="session-code-hint">Share this code with your team</div>
  </div>

  <div class="members-list" id="membersList">
    <div class="members-header">Connected Players</div>
  </div>

  <button class="btn-start-session" onclick="startRecording()">START RECORDING</button>
</div>

<!-- CAMERA -->
<div id="camera" class="screen">
  <video id="videoEl" autoplay playsinline muted></video>
  <div class="flash" id="flash"></div>
  <div class="focus-ring" id="focusRing"></div>

  <div class="zoom-wrap" id="zoomWrap">
    <div class="zoom-val" id="zoomVal">1×</div>
    <input type="range" class="zoom-slider" id="zoomSlider" min="1" max="5" step="0.1" value="1" oninput="applyZoom(this.value)">
    <div class="zoom-label-v">Zoom</div>
  </div>

  <div class="cam-overlay">
    <div class="cam-top">
      <div class="cam-wordmark">SHOT<span class="dot">.</span></div>
      <div class="session-strip" id="sessionStrip"></div>
      <div class="cam-top-btns">
        <div class="rec-pill" id="recPill">
          <div class="rec-dot"></div>
          <span class="rec-text" id="recLabel">REC</span>
        </div>
        <button class="cam-icon-btn" onclick="toggleZoom()" title="Zoom">🔍</button>
        <button class="cam-icon-btn" onclick="showScreen('waiting')" title="Members">👥</button>
      </div>
    </div>

    <div class="cam-bottom">
      <div class="buffer-ring-wrap">
        <svg viewBox="0 0 140 140" width="140" height="140">
          <circle class="ring-bg" cx="70" cy="70" r="60"/>
          <circle class="ring-fill" id="ringFill" cx="70" cy="70" r="60"/>
        </svg>
        <button class="shot-btn disabled" id="captureBtn" onclick="triggerCapture()">
          <div class="shot-btn-label">SHOT</div>
          <div class="shot-btn-sub" id="btnSub">tap to capture</div>
        </button>
      </div>
      <div class="buffer-hint" id="bufferHint">Building buffer...</div>
    </div>
  </div>
</div>

<!-- REVIEW -->
<div id="review" class="screen">
  <div class="review-header">
    <div class="review-title">SHOT<span class="dot">.</span></div>
    <div class="review-session-badge" id="reviewBadge">----</div>
  </div>
  <div class="review-body">
    <div class="review-section-label" id="reviewLabel">Waiting for clips...</div>
    <div class="clips-grid" id="clipsGrid"></div>
    <div class="review-actions">
      <button class="btn-save-my" id="saveMyBtn" onclick="saveMyClip()" disabled>
        💾 SAVE MY CLIP
      </button>
      <button class="btn-record-again" onclick="recordAgain()">Record Another Shot</button>
    </div>
  </div>
</div>

<!-- Clip viewer modal -->
<div class="clip-viewer" id="clipViewer">
  <button class="clip-viewer-close" onclick="closeViewer()">✕</button>
  <video id="viewerVideo" controls playsinline style="width:100%;max-height:65vh;border-radius:8px;"></video>
  <div class="clip-viewer-owner" id="viewerOwner"></div>
  <div class="clip-viewer-btns">
    <button class="btn-viewer-save" onclick="saveViewedClip()">💾 SAVE THIS CLIP</button>
  </div>
</div>

<div class="processing" id="processing">
  <div class="proc-spinner"></div>
  <div class="proc-label" id="procLabel">Processing...</div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──
const ABLY_KEY        = 'LgSl_A.GsZTfg:a8AP-P4qjUe5UoGfh2CgxghjI45HBEgcqDIlM4DtPB8';
const CLOUD_NAME      = 'dalfizegr';
const UPLOAD_PRESET   = 'b6csb9ca';
const TIMESLICE_MS    = 1000;
const RING_CIRC       = 2 * Math.PI * 60; // r=60

// ── STATE ──
let myName        = '';
let myId          = 'user_' + Math.random().toString(36).slice(2,8);
let sessionCode   = '';
let bufferSecs    = 60;
let members       = {}; // id -> name
let clips         = {}; // id -> { owner, url, duration, isMe }
let myClipBlob    = null;
let myClipURL     = null;
let viewerURL     = null;

// Ably
let ably          = null;
let channel       = null;

// Camera
let mediaStream   = null;
let mediaRecorder = null;
let chunks        = [];
let isBuffering   = false;
let uiTimer       = null;
let currentZoom   = 1;
let zoomVisible   = false;

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── LOBBY ──
function createSession() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showToast('Enter your name first'); return; }
  myName = name;
  sessionCode = Math.floor(1000 + Math.random() * 9000).toString();
  connectAbly(sessionCode);
}

function joinSession() {
  const name = document.getElementById('nameInput').value.trim();
  const code = document.getElementById('codeInput').value.trim();
  if (!name) { showToast('Enter your name first'); return; }
  if (code.length !== 4) { showToast('Enter a 4-digit session code'); return; }
  myName = name;
  sessionCode = code;
  connectAbly(sessionCode);
}

// ── ABLY CONNECTION ──
function connectAbly(code) {
  showProcessing(true, 'Connecting...');
  try {
    ably = new Ably.Realtime({ key: ABLY_KEY });
    ably.connection.on('connected', () => {
      channel = ably.channels.get('shot-session-' + code);

      // Subscribe to messages
      channel.subscribe('member-join', onMemberJoin);
      channel.subscribe('member-leave', onMemberLeave);
      channel.subscribe('capture-sync', onCaptureSync);
      channel.subscribe('clip-ready', onClipReady);

      // Announce ourselves
      channel.publish('member-join', { id: myId, name: myName });

      // Add ourselves to members
      members[myId] = myName;

      showProcessing(false);
      document.getElementById('displayCode').textContent = code;
      document.getElementById('reviewBadge').textContent = code;
      renderMembers();
      showScreen('waiting');
    });

    ably.connection.on('failed', () => {
      showProcessing(false);
      showToast('Connection failed — check your network');
    });
  } catch(e) {
    showProcessing(false);
    showToast('Connection error');
    console.error(e);
  }
}

// ── MEMBER EVENTS ──
function onMemberJoin(msg) {
  const { id, name } = msg.data;
  members[id] = name;
  renderMembers();
  updateSessionStrip();
  if (id !== myId) showToast(name + ' joined the session');
}

function onMemberLeave(msg) {
  const { id } = msg.data;
  const name = members[id] || 'Someone';
  delete members[id];
  renderMembers();
  updateSessionStrip();
  showToast(name + ' left');
}

function renderMembers() {
  const list = document.getElementById('membersList');
  list.innerHTML = '<div class="members-header">Connected Players (' + Object.keys(members).length + ')</div>';
  for (const [id, name] of Object.entries(members)) {
    const isMe = id === myId;
    list.innerHTML += `
      <div class="member-item">
        <div class="member-avatar">${name[0].toUpperCase()}</div>
        <div class="member-name">${name}</div>
        ${isMe ? '<div class="member-you">You</div>' : '<div class="member-dot"></div>'}
      </div>`;
  }
}

function updateSessionStrip() {
  const strip = document.getElementById('sessionStrip');
  strip.innerHTML = '';
  for (const [id, name] of Object.entries(members)) {
    strip.innerHTML += `<div class="strip-avatar" id="avatar_${id}" title="${name}">${name[0].toUpperCase()}</div>`;
  }
}

// ── START RECORDING ──
async function startRecording() {
  showProcessing(true, 'Starting camera...');
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: true
    });
    document.getElementById('videoEl').srcObject = mediaStream;
    await document.getElementById('videoEl').play();
    showProcessing(false);
    showScreen('camera');
    updateSessionStrip();
    startBuffering();
    setupCameraGestures();
  } catch(e) {
    showProcessing(false);
    showToast('Camera access required');
    console.error(e);
  }
}

// ── BUFFERING ──
function startBuffering() {
  chunks = []; isBuffering = true;
  document.getElementById('recPill').style.opacity = '1';
  document.getElementById('captureBtn').classList.add('disabled');
  document.getElementById('ringFill').style.strokeDashoffset = RING_CIRC;

  const mime = getBestMime();
  try { mediaRecorder = new MediaRecorder(mediaStream, mime ? { mimeType: mime } : {}); }
  catch(e) { mediaRecorder = new MediaRecorder(mediaStream); }

  mediaRecorder.ondataavailable = e => {
    if (e.data && e.data.size > 0) {
      chunks.push({ blob: e.data, ts: Date.now() });
      pruneBuffer();
    }
  };
  mediaRecorder.start(TIMESLICE_MS);
  uiTimer = setInterval(updateUI, 500);
}

function stopBuffering() {
  isBuffering = false;
  clearInterval(uiTimer);
  if (mediaRecorder?.state === 'recording') {
    try { mediaRecorder.requestData(); mediaRecorder.stop(); } catch(e) {}
  }
}

function pruneBuffer() {
  const cutoff = Date.now() - bufferSecs * 1000;
  while (chunks.length && chunks[0].ts < cutoff) chunks.shift();
}

function updateUI() {
  if (!isBuffering) return;
  const secs = chunks.length ? Math.min((Date.now() - chunks[0].ts) / 1000, bufferSecs) : 0;
  document.getElementById('ringFill').style.strokeDashoffset = RING_CIRC * (1 - secs / bufferSecs);
  if (secs >= 3) {
    document.getElementById('captureBtn').classList.remove('disabled');
    document.getElementById('recLabel').textContent = 'REC';
    document.getElementById('bufferHint').innerHTML = '<strong>' + Math.round(secs) + 's</strong> buffered · tap SHOT';
    document.getElementById('btnSub').textContent = 'tap to capture';
  } else {
    document.getElementById('bufferHint').textContent = 'Building buffer...';
  }
}

function getBestMime() {
  const types = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4',''];
  for (const t of types) if (!t || MediaRecorder.isTypeSupported(t)) return t;
  return '';
}

// ── CAPTURE TRIGGER ──
// Anyone presses SHOT → broadcast sync timestamp → all phones clip simultaneously
async function triggerCapture() {
  if (!chunks.length) { showToast('Still buffering...'); return; }

  // Flash
  const fl = document.getElementById('flash');
  fl.classList.add('show'); setTimeout(() => fl.classList.remove('show'), 100);

  // Broadcast sync signal with precise timestamp
  const syncTs = Date.now();
  channel.publish('capture-sync', { triggeredBy: myId, triggeredByName: myName, syncTs });

  // Also capture locally
  doCapture(syncTs);
}

function onCaptureSync(msg) {
  const { triggeredBy, triggeredByName, syncTs } = msg.data;
  // If someone else triggered, show notification and capture
  if (triggeredBy !== myId) {
    showToast(triggeredByName + ' captured a Shot!');
    doCapture(syncTs);
  }
}

async function doCapture(syncTs) {
  stopBuffering();
  await delay(400);

  try {
    pruneBuffer();
    const mime = mediaRecorder?.mimeType || 'video/webm';
    myClipBlob = new Blob(chunks.map(c => c.blob), { type: mime });
    if (myClipURL) URL.revokeObjectURL(myClipURL);
    myClipURL = URL.createObjectURL(myClipBlob);

    // Show review screen immediately with local clip
    clips = {};
    document.getElementById('clipsGrid').innerHTML = '';
    showScreen('review');
    document.getElementById('reviewLabel').textContent = 'Your clip — uploading others...';

    // Add my clip immediately (local)
    addClipCard(myId, myName, myClipURL, true, false);
    document.getElementById('saveMyBtn').disabled = false;

    // Upload to Cloudinary and broadcast URL to session
    uploadToCloudinary(myClipBlob, myName);

  } catch(e) {
    console.error(e);
    showToast('Capture failed — try again');
    startBuffering();
  }
}

// ── CLOUDINARY UPLOAD ──
async function uploadToCloudinary(blob, ownerName) {
  const cardId = 'clip_' + myId;
  const card = document.getElementById(cardId);
  if (card) card.classList.add('uploading');

  try {
    const formData = new FormData();
    formData.append('file', blob, 'shot.webm');
    formData.append('upload_preset', UPLOAD_PRESET);
    formData.append('resource_type', 'video');

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`);

    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        const pct = Math.round(e.loaded / e.total * 100);
        const overlay = document.querySelector(`#${cardId} .clip-upload-pct`);
        if (overlay) overlay.textContent = pct + '%';
      }
    };

    xhr.onload = () => {
      const res = JSON.parse(xhr.responseText);
      if (res.secure_url) {
        // Broadcast clip URL to all session members
        channel.publish('clip-ready', {
          id: myId,
          name: myName,
          url: res.secure_url,
          duration: res.duration || 0
        });
        // Update my own card
        if (card) card.classList.remove('uploading');
        updateClipCard(myId, res.secure_url);
      } else {
        showToast('Upload issue — your clip is saved locally');
      }
    };

    xhr.onerror = () => showToast('Upload failed — clip saved locally');
    xhr.send(formData);

  } catch(e) {
    console.error(e);
    showToast('Upload failed');
  }
}

function onClipReady(msg) {
  const { id, name, url, duration } = msg.data;
  if (id === myId) return; // already have our own
  addClipCard(id, name, url, false, false);
  const count = document.querySelectorAll('.clip-card').length;
  document.getElementById('reviewLabel').textContent = count + ' angle' + (count !== 1 ? 's' : '') + ' captured';
  showToast(name + "'s clip is ready");
}

// ── CLIP CARDS ──
function addClipCard(id, name, url, isMe, uploading) {
  clips[id] = { name, url, isMe };
  const grid = document.getElementById('clipsGrid');
  const card = document.createElement('div');
  card.className = 'clip-card' + (uploading ? ' uploading' : '');
  card.id = 'clip_' + id;
  card.onclick = () => openViewer(id);
  card.innerHTML = `
    ${isMe ? '<div class="clip-mine-badge">YOU</div>' : ''}
    <div class="clip-thumb">
      <video src="${url}" preload="metadata" muted playsinline style="width:100%;height:100%;object-fit:cover;"></video>
      <div class="clip-play-overlay">
        <div class="clip-play-btn">▶</div>
      </div>
      ${uploading ? `<div class="clip-uploading-overlay"><div class="clip-upload-spinner"></div><div class="clip-upload-pct">0%</div></div>` : ''}
    </div>
    <div class="clip-info">
      <div class="clip-owner">${name}</div>
      <div class="clip-duration">${isMe ? 'Your angle' : "Their angle"}</div>
    </div>`;
  grid.appendChild(card);

  const count = document.querySelectorAll('.clip-card').length;
  document.getElementById('reviewLabel').textContent = count + ' angle' + (count !== 1 ? 's' : '') + ' captured';
}

function updateClipCard(id, url) {
  clips[id].url = url;
  const card = document.getElementById('clip_' + id);
  if (!card) return;
  card.classList.remove('uploading');
  const overlay = card.querySelector('.clip-uploading-overlay');
  if (overlay) overlay.remove();
  const vid = card.querySelector('video');
  if (vid) vid.src = url;
}

// ── CLIP VIEWER ──
function openViewer(id) {
  const clip = clips[id];
  if (!clip) return;
  viewerURL = clip.url;
  document.getElementById('viewerVideo').src = clip.url;
  document.getElementById('viewerOwner').textContent = clip.name + "'s angle";
  document.getElementById('clipViewer').classList.add('show');
  document.getElementById('viewerVideo').play();
}

function closeViewer() {
  document.getElementById('clipViewer').classList.remove('show');
  document.getElementById('viewerVideo').pause();
  document.getElementById('viewerVideo').src = '';
}

async function saveViewedClip() {
  if (!viewerURL) return;
  await downloadURL(viewerURL, 'shot-angle-' + Date.now());
  showToast('Clip saved!');
}

// ── SAVE MY CLIP ──
async function saveMyClip() {
  if (!myClipBlob) return;
  showProcessing(true, 'Saving...');
  try {
    const url = URL.createObjectURL(myClipBlob);
    const ext = myClipBlob.type.includes('mp4') ? 'mp4' : 'webm';
    await downloadURL(url, 'myshot-' + Date.now() + '.' + ext);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    showProcessing(false);
    showToast('Your clip saved to device!');
  } catch(e) {
    showProcessing(false);
    showToast('Save failed');
  }
}

async function downloadURL(url, filename) {
  return new Promise(resolve => {
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(resolve, 500);
  });
}

// ── RECORD AGAIN ──
function recordAgain() {
  clips = {}; myClipBlob = null;
  document.getElementById('clipsGrid').innerHTML = '';
  document.getElementById('saveMyBtn').disabled = true;
  showScreen('camera');
  startBuffering();
}

// ── ZOOM ──
function toggleZoom() {
  zoomVisible = !zoomVisible;
  document.getElementById('zoomWrap').classList.toggle('visible', zoomVisible);
}

async function applyZoom(val) {
  currentZoom = parseFloat(val);
  document.getElementById('zoomVal').textContent = currentZoom.toFixed(1) + '×';
  if (!mediaStream) return;
  const track = mediaStream.getVideoTracks()[0];
  if (!track) return;
  try {
    const caps = track.getCapabilities();
    if (caps.zoom) {
      await track.applyConstraints({ advanced: [{ zoom: currentZoom }] });
    } else {
      const v = document.getElementById('videoEl');
      v.style.transform = `scale(${currentZoom})`;
    }
  } catch(e) {
    document.getElementById('videoEl').style.transform = `scale(${currentZoom})`;
  }
}

// Pinch to zoom
let pinchDist0 = 0, pinchZoom0 = 1;
function setupCameraGestures() {
  const cam = document.getElementById('camera');

  cam.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      pinchDist0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      pinchZoom0 = currentZoom;
    }
  }, { passive: true });

  cam.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const z = Math.min(Math.max(pinchZoom0 * (d / pinchDist0), 1), 8);
      document.getElementById('zoomSlider').value = z;
      applyZoom(z);
    }
  }, { passive: true });

  // Tap to focus
  document.getElementById('videoEl').addEventListener('touchend', e => {
    if (e.changedTouches.length === 1 && e.touches.length === 0) {
      const t = e.changedTouches[0];
      const ring = document.getElementById('focusRing');
      ring.style.left = t.clientX + 'px'; ring.style.top = t.clientY + 'px';
      ring.className = 'focus-ring focusing';
      setTimeout(() => ring.classList.add('focused'), 280);
      setTimeout(() => { ring.className = 'focus-ring'; }, 1800);
      const track = mediaStream?.getVideoTracks()[0];
      if (track) {
        const rect = document.getElementById('videoEl').getBoundingClientRect();
        try {
          track.applyConstraints({ advanced: [{ focusMode: 'manual', pointsOfInterest: [{ x: (t.clientX - rect.left) / rect.width, y: (t.clientY - rect.top) / rect.height }] }] }).catch(()=>{});
        } catch(e) {}
      }
    }
  });
}

// ── UTILS ──
function showProcessing(v, label) {
  document.getElementById('processing').classList.toggle('show', v);
  if (label) document.getElementById('procLabel').textContent = label;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
  if (channel) channel.publish('member-leave', { id: myId, name: myName });
  if (ably) ably.close();
});

document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - (document.lastTouch||0) < 300) e.preventDefault();
  document.lastTouch = now;
}, { passive: false });
</script>
</body>
</html>
